version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Overwrite placeholder with real config if env var is set
        - if [ -n "$AMPLIFY_OUTPUTS" ]; then echo "$AMPLIFY_OUTPUTS" > amplify_outputs.json; fi
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
